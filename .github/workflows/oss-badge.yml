name: Generate OSS Badge

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-oss-badge
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync with remote main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - uses: mabd-dev/gh-oss-stats-action@v0.2.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          badge-path: 'images/oss-badge.svg'
          badge-style: 'detailed'
          badge-theme: 'light'
          badge-variant: 'text-based'
          min-stars: '3'

      - name: Commit and push badge
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update OSS contribution badge
          file_pattern: images/oss-badge.svg