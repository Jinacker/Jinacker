<svg
  xmlns:xlink="http://www.w3.org/1999/xlink"
  xmlns="http://www.w3.org/2000/svg"
  xml:space="preserve"
  width="110.6mm"
  height="30mm"
  viewBox="-0.1 -0.1 110.6 30"
>
  <title>Jinacker Open-Source Contributions</title>

  <defs>
    <!-- STATES ICON -->
    <path
      id="state-open"
      d="M1.5 3.25a2.25 2.25 0 1 1 3 2.122v5.256a2.251 2.251 0 1 1-1.5 0V5.372A2.25 2.25 0 0 1 1.5 3.25Zm5.677-.177L9.573.677A.25.25 0 0 1 10 .854V2.5h1A2.5 2.5 0 0 1 13.5 5v5.628a2.251 2.251 0 1 1-1.5 0V5a1 1 0 0 0-1-1h-1v1.646a.25.25 0 0 1-.427.177L7.177 3.427a.25.25 0 0 1 0-.354zM3.75 2.5a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5zm0 9.5a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5zm8.25.75a.75.75 0 1 0 1.5 0 .75.75 0 0 0-1.5 0z"
      fill="var(--icon-open)"
      transform="scale(0.32)"
    />
    <path
      id="state-merged"
      d="M5.45 5.154A4.25 4.25 0 0 0 9.25 7.5h1.378a2.251 2.251 0 1 1 0 1.5H9.25A5.734 5.734 0 0 1 5 7.123v3.505a2.25 2.25 0 1 1-1.5 0V5.372a2.25 2.25 0 1 1 1.95-.218ZM4.25 13.5a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5zm8.5-4.5a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5zM5 3.25a.75.75 0 1 0 0 .005z"
      fill="var(--icon-merged)"
      transform="scale(0.32)"
    />
    <path
      id="state-closed"
      d="M3.25 1A2.25 2.25 0 0 1 4 5.372v5.256a2.251 2.251 0 1 1-1.5 0V5.372A2.251 2.251 0 0 1 3.25 1Zm9.5 5.5a.75.75 0 0 1 .75.75v3.378a2.251 2.251 0 1 1-1.5 0V7.25a.75.75 0 0 1 .75-.75Zm-2.03-5.273a.75.75 0 0 1 1.06 0l.97.97.97-.97a.748.748 0 0 1 1.265.332.75.75 0 0 1-.205.729l-.97.97.97.97a.751.751 0 0 1-.018 1.042.751.751 0 0 1-1.042.018l-.97-.97-.97.97a.749.749 0 0 1-1.275-.326.749.749 0 0 1 .215-.734l.97-.97-.97-.97a.75.75 0 0 1 0-1.06zM2.5 3.25a.75.75 0 1 0 1.5 0 .75.75 0 0 0-1.5 0zM3.25 12a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5zm9.5 0a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5z"
      fill="var(--icon-closed)"
      transform="scale(0.32)"
    />

    <!-- MASK GRADIENT 1 -->
    <linearGradient id="maskGradient1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="75%" stop-color="white" stop-opacity="1" />
      <stop offset="90%" stop-color="white" stop-opacity="0" />
    </linearGradient>
    <mask id="fade_title">
      <rect width="100%" height="100%" fill="url(#maskGradient1)" />
    </mask>

    <!-- MASK GRADIENT 2 -->
    <linearGradient id="maskGradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="70%" stop-color="white" stop-opacity="1" />
      <stop offset="75%" stop-color="white" stop-opacity="0" />
    </linearGradient>
    <mask id="fade">
      <rect width="100%" height="100%" fill="url(#maskGradient2)" />
    </mask>

    <style type="text/css">
      :root {
        --wrapper-title-background: #f6f8fa;
        --wrapper-content-background: #f6f8fa;
        --wrapper-border: #d1d9e0;
        --text: #1f2328;
        --muted: #59636e;
        --star: #bf8700;
        --avatar-background: #ffffff;
        --icon-open: #1a7f37;
        --icon-merged: #8250df;
        --icon-closed: #d1242f;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --wrapper-title-background: #151b23;
          --wrapper-content-background: #0d1117;
          --wrapper-border: #3d444d;
          --text: #9198a1;
          --muted: #7d8590;
          --star: #d29922;
          --avatar-background: #151b23;
        }
      }

      * {
        font-family: "Noto Sans", "Segoe UI", Arial, sans-serif;
      }

      .title {
        font-weight: 700;
        font-size: 3.8px;
      }

      .updated {
        font-size: 2.2px;
      }

      .repo {
        font-size: 2.7px;
      }

      .pr-title {
        font-size: 3.3px;
      }

      .age {
        font-size: 2.7px;
      }

      .avatar-text {
        font-size: 1.35px;
        font-weight: 700;
      }

      @keyframes fade_in_background {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes fade_in {
        from {
          opacity: 0;
          transform: translate(0, 3px);
        }
        to { opacity: 1; }
      }

      #title-bg {
        opacity: 0;
        animation: fade_in_background 0.5s ease 0s 1 forwards;
      }

      #content-1-bg {
        opacity: 0;
        animation: fade_in_background 0.5s ease 0.15s 1 forwards;
      }

      #title {
        opacity: 0;
        animation: fade_in 0.5s ease 0.15s 1 forwards;
      }

      #content-1 {
        opacity: 0;
        animation: fade_in 0.5s ease 0.30s 1 forwards;
      }

    </style>
  </defs>

  <!-- HEADER -->
  <g>
    <path
      id="title-bg"
      fill="var(--wrapper-title-background)"
      stroke="var(--wrapper-border)"
      stroke-width="0.2"
      stroke-linecap="square"
      d="M0 2 Q 0 0, 2 0 H 108 Q 110 0, 110 2 V 15 H 0 L 0 2"
    />
    <g id="title" mask="url(#fade_title)">
      <text
        y="8"
        x="5"
        fill="var(--text)"
        class="title"
        opacity="0.9"
      >
        Jinacker Open-Source Contributions
      </text>
      <text
        y="12"
        x="5"
        fill="var(--text)"
        class="updated"
        opacity="0.5"
      >
        - Updated at 2026-05-13 KST -
      </text>
    </g>
  </g>

  <!-- CONTENT 1 -->
  <g transform="translate(0, 14.8)">
    <path
      id="content-1-bg"
      fill="var(--wrapper-content-background)"
      stroke="var(--wrapper-border)"
      stroke-width="0.2"
      stroke-linecap="square"
      d="M0 0 H 110 V 13 Q 110 15, 108 15 H 2 Q 0 15, 0 13 L 0 0"
    />
    <g id="content-1">
      <g mask="url(#fade)">
        <g transform="translate(5, 4.8)">
          <use href="#state-merged" />
        </g>

        <g transform="translate(14, 6)">
          <circle cx="1.3" cy="-0.9" r="1.1" fill="var(--avatar-background)" stroke="var(--wrapper-border)" stroke-width="0.15" />
          <text x="1.3" y="-0.45" fill="var(--muted)" class="avatar-text" text-anchor="middle">J</text>
          <text y="0" x="3.1" fill="var(--text)" class="repo" opacity="0.7">
            <tspan>mermaid-js/mermaid</tspan>
            <tspan fill="var(--muted)"> · </tspan>
            <tspan fill="var(--star)">star 88k</tspan>
          </text>
          <text y="4.6" x="0" fill="var(--text)" class="pr-title" opacity="0.7">
            fix(dagre): merge flowchart and state self-loop segments before rendering
          </text>
        </g>
      </g>

      <text y="8.5" x="105" fill="var(--text)" class="age" opacity="0.7" text-anchor="end">
        last week
      </text>
    </g>
  </g>
</svg>
